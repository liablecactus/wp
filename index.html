<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYLO – Der neue Standard</title>
    <style>
        /* Direktes CSS - funktioniert immer, auch ohne Internet-Frameworks */
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; text-align: center; }
        nav { width: 100%; max-width: 1200px; padding: 40px; display: flex; justify-content: space-between; box-sizing: border-box; }
        .hero { padding: 100px 20px; }
        h1 { font-size: 80px; font-weight: 900; margin: 0; letter-spacing: -4px; }
        .tagline { color: #666; font-size: 20px; margin-top: 10px; font-style: italic; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; padding: 20px; box-sizing: border-box; }
        .card { background: #111; padding: 40px; border-radius: 30px; border: 1px solid #222; }
        .price { font-size: 60px; font-weight: 900; color: #fff; margin: 10px 0; }
        .btn { background: #fff; color: #000; padding: 15px 40px; border-radius: 50px; font-weight: bold; text-decoration: none; margin-top: 40px; display: inline-block; }
        .promo { color: #ff3b30; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 900; font-size: 24px;">RYLO</div>
        <div style="font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px;">2026 Edition</div>
    </nav>

    <div class="hero">
        <span class="promo">Launch Edition</span>
        <h1>RYLO.</h1>
        <p class="tagline">Premium-Performance trifft auf Polycarbonat.</p>
    </div>

    <div class="grid">
        <div class="card" style="grid-column: span 1;">
            <p style="color: #666; text-transform: uppercase; font-size: 10px;">Aktion bis 14. Mai</p>
            <div class="price">299€</div>
            <p style="color: #444; text-decoration: line-through;">Statt 499€</p>
        </div>

        <div class="card">
            <h3 style="font-size: 30px; margin: 0;">120Hz</h3>
            <p style="color: #666;">Super AMOLED Display</p>
        </div>

        <div class="card">
            <h3 style="font-size: 30px; margin: 0;">SD 6G3</h3>
            <p style="color: #666;">Snapdragon Power</p>
        </div>
    </div>

    <a href="#" class="btn">JETZT KAUFEN</a>

    <footer style="margin: 100px 0 50px; color: #222; font-size: 10px; letter-spacing: 5px; text-transform: uppercase;">
        RYLO Global
    </footer>

</body>
</html>
