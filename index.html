<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RYLO – Der neue Standard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Backup-Styles falls Tailwind im Browser nicht sofort lädt */
        body { background-color: #000 !important; color: #fff !important; margin: 0; font-family: sans-serif; }
        .bento-card { background-color: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 40px; padding: 2rem; }
    </style>
</head>
<body class="bg-black text-white antialiased">

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto">
        <div class="text-2xl font-black tracking-tighter uppercase">RYLO</div>
        <button class="border border-white/20 px-6 py-2 rounded-full text-[10px] font-bold hover:bg-white hover:text-black transition uppercase tracking-widest">Jetzt kaufen</button>
    </nav>

    <section class="min-h-[60vh] flex flex-col items-center justify-center text-center px-6">
        <span class="text-blue-500 font-bold tracking-[0.4em] uppercase text-[10px] mb-4">Launch Edition</span>
        <h1 class="text-7xl md:text-[140px] font-black leading-none tracking-tighter mb-6">RYLO.</h1>
        <p class="text-zinc-500 text-lg md:text-xl max-w-xl font-light italic">
            Der neue Standard für günstige Smartphones. <br>
            <span class="text-white not-italic font-medium text-sm uppercase tracking-widest">Premium-Performance / Polycarbonat</span>
        </p>
    </section>

    <section class="max-w-6xl mx-auto py-12 px-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            
            <div class="md:col-span-2 bento-card flex flex-col justify-between min-h-[250px] bg-zinc-900">
                <p class="text-zinc-500 uppercase text-[10px] font-bold tracking-widest">Aktionspreis</p>
                <div>
                    <h2 class="text-7xl font-black italic">299€</h2>
                    <p class="text-red-500 font-bold text-sm mt-2 uppercase tracking-tighter">Gültig bis 14. Mai • Statt 499€</p>
                </div>
            </div>

            <div class="bento-card bg-zinc-900 border-white/10 text-center flex flex-col justify-center">
                <h3 class="text-4xl font-bold tracking-tighter italic">120Hz</h3>
                <p class="text-zinc-500 text-[10px] uppercase font-bold mt-2">Super AMOLED</p>
            </div>

            <div class="bento-card bg-zinc-900 text-center flex flex-col justify-center">
                <h3 class="text-4xl font-bold tracking-tighter">SD 6G3</h3>
                <p class="text-zinc-500 text-[10px] uppercase font-bold mt-2">Snapdragon Power</p>
            </div>

            <div class="md:col-span-2 bento-card bg-zinc-900 flex items-center justify-between">
                <div>
                    <h3 class="text-4xl font-black italic">50MP + OIS</h3>
                    <p class="text-zinc-500 text-[10px] uppercase font-bold mt-1">Optische Stabilisierung</p>
                </div>
                <div class="bg-white/5 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest">4K Video</div>
            </div>

        </div>
    </section>

    <footer class="py-20 text-center text-zinc-800 text-[10px] font-bold tracking-[0.6em] uppercase">
        RYLO Global &copy; 2026
    </footer>

</body>
</html>
